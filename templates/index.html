<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌤️ Clima Agora</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: scale(1.02);
        }
        h1 {
            margin-top: 0;
            color: #333;
        }
        input {
            width: 80%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 16px;
        }
        button {
            background: #4facfe;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        button:hover {
            background: #007bff;
        }
        .resultado {
            margin-top: 20px;
            font-size: 18px;
        }
        .temperatura{
            font-size: 32px;
            font-weight: bold;
            margin: 10px 0;
        }
        .icone {
            width: 80px;
        }
        .erro {
            color: red;
            margin-top: 10px;
        }

    </style>
</head>
<body>
    <div class="card">
        <h1>🌤️ Clima Agora</h1>
        <form method="POST">
            <input type="text" name="cidade" placeholder="Digite sua Cidade" required>
            <br>
            <button type="submit">Consultar</button>
        </form>
        {% if clima %}
        <div class="resultado">
            <h2>{{ clima.cidade }}</h2>
            <img class="icone" src="{{ clima.icone }}" alt="Icone do clima">
            <div class="temperatura">{{ clima.temp }}°C</div>
            <p>Sensação termica: {{ clima.sensacao }}°C</p>
            <p>{{ clima.descricao }}</p>
        </div>
        {% endif %}
        {% if erro %}
        <div class="erro">{{ erro }}</div>
        {% endif %}
    </div>
</body>
</html>
